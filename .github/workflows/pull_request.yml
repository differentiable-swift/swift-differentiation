name: Pull Request

on: [pull_request]

jobs:
  Lint:
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: SwiftFormat
        run: swiftformat --lint --strict . --reporter github-actions-log
  test-ubuntu-latest:
    name: Test Swift ${{ matrix.swift }} Ubuntu Latest
    strategy:
      matrix:
        swift: ["6.2", "6.3"]
    runs-on: ubuntu-latest
    container: swift:${{ matrix.swift }}
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: swift test -Xswiftc -warnings-as-errors

  test-macos-26:
    name: Test Swift macos-26
    runs-on: macos-26
    steps:
      - uses: actions/checkout@v4
      - name: Run Tests
        run: |
          swift test -Xswiftc -warnings-as-errors

  test-wasm:
    name: WASM compilation check
    runs-on: ubuntu-latest
    container:
      image: swift:6.3
    steps:
      - uses: actions/checkout@v4
      - uses: swiftwasm/setup-swiftwasm@v2
        id: setup-swiftwasm
        with:
          target: wasm32-unknown-wasip1
      - name: Build for WebAssembly
        run: swift build --swift-sdk ${{ steps.setup-swiftwasm.outputs.swift-sdk-id }}
